<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pembayaran Berhasil</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #5e603a;
      overflow-x: hidden;
      animation: pageShow 0.4s ease;
    }

    @keyframes pageShow {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 30px;
      border-bottom: 1px solid rgba(255,255,255,0.6);
      flex-shrink: 0;
    }

    .brand { display: flex; align-items: center; gap: 14px; }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .brand-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      color: #f2f2f2;
      font-size: 21px;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .brand-tagline {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.65);
    }

    .booking-pill {
      flex: 1;
      background: #efefef;
      border-radius: 30px;
      text-align: center;
      padding: 14px 0;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 16px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 560px;
      margin: 30px auto;
    }

    h1 {
      color: green;
      font-size: 40px;
      margin: 0;
    }

    button {
      margin-top: 20px;
      padding: 15px 25px;
      background: #5e603a;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <img src="Image/logo.png" alt="Logo LocalOutdoor" style="width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.55);flex-shrink:0;">
      <div class="brand-text">
        <span class="brand-name">LocalOutdoor</span>
        <span class="brand-tagline">Jalur Resmi Gunung Sindoro</span>
      </div>
    </div>
    <div class="booking-pill">BOOKING ONLINE</div>
  </header>
  <div class="card">
    <h1>✅</h1>
    <h2>Transaksi Berhasil</h2>
    <p>Pembayaran Open Trip berhasil diterima.</p>
    <p><b>Status :</b> Lunas</p>
    <p><b>Metode :</b> <span id="metodeText">-</span></p>
    <p><b>Invoice :</b> <span id="invoiceText">-</span></p>
    <p><b>Total :</b> <span id="totalText">-</span></p>

    <button onclick="window.location.href='Booking_Online/pembayaran.html'">unggah berkas anda</button>
  </div>

  <script>
    const metode = sessionStorage.getItem("metode") || "qris";
    const invoice = sessionStorage.getItem("invoice") || "INV-00000000";
    const amount = Number(sessionStorage.getItem("amount") || 180000);

    const label = {
      qris: "QRIS",
      dana: "DANA",
      bri: "Bank BRI"
    }[metode] || "Tidak diketahui";

    document.getElementById("metodeText").textContent = label;
    document.getElementById("invoiceText").textContent = invoice;
    document.getElementById("totalText").textContent = `Rp${amount.toLocaleString("id-ID")}`;
  </script>
</body>
</html>
