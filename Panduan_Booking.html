<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalOutdoor | Cek Kuota</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="header.css">

<body>

    <header>

        <div class="logo">
            <img src="Image/logo.png" alt="Logo">

            <div class="logo-text">
                <h2>LocalOutdoor</h2>
                <p>Explore Nature</p>
            </div>
        </div>

        <nav>
            <a href="index.html" class="active">Beranda</a>
            <a href="Panduan_Booking.html">Panduan Booking</a>
            <a href="Cek_Kuota.html">Cek Kuota</a>
        </nav>

    </header>

    <!-- ================= MAIN ================= -->

    <main>

        <!-- ================= KIRI ================= -->

        <section class="left">

            <h2>Periode</h2>

            <select id="bulan">

                <option>Januari 2026</option>
                <option>Februari 2026</option>
                <option>Maret 2026</option>
                <option>April 2026</option>
                <option>Mei 2026</option>
                <option>Juni 2026</option>
                <option>Juli 2026</option>
                <option selected>Agustus 2026</option>
                <option>September 2026</option>
                <option>Oktober 2026</option>
                <option>November 2026</option>
                <option>Desember 2026</option>

            </select>

            <h2>Jalur Pendakian</h2>

            <select id="jalur">

                <option>Kledung</option>
                <option>Alang-Alang Sewu</option>
                <option>Ndoro Arum</option>
                <option>Sigedang</option>
                <option>Bansari</option>
                <option>Bedakah</option>
                <option>Bowongso</option>
                <option>Anggrunggondok</option>

            </select>

            <h2>Tanggal Pendakian</h2>

            <select id="tanggal">

                <!-- Diisi oleh JavaScript -->

            </select>

            <div class="kuota-box">

                <h3>Sisa Kuota</h3>

                <h1 id="kuota">120 Orang</h1>

            </div>

        </section>

        <!-- ================= KANAN ================= -->

        <section class="right">

            <a href="booking.html" class="menu-button">
                Booking Online
            </a>

            <a href="kontak.html" class="menu-button">
                Kontak
            </a>

            <div class="calendar">

                <div class="calendar-header">

                    <button id="prevMonth">&#10094;</button>

                    <h3 id="monthYear"></h3>

                    <button id="nextMonth">&#10095;</button>

                </div>

                <div class="weekdays">

                    <span>Min</span>
                    <span>Sen</span>
                    <span>Sel</span>
                    <span>Rab</span>
                    <span>Kam</span>
                    <span>Jum</span>
                    <span>Sab</span>

                </div>

                <div id="calendarDays"></div>

            </div>

        </section>
    </main>
</body>
</html>
