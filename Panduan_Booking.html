<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalOutdoor | Cek Kuota</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="header.css">
    <style>
        main{
            width:420px;
            margin:50px auto;
        }

        /* ==========================
   RIGHT
========================== */

        .right{
            width:100%;
            padding-left:0;
            border-left:none;
        }

        /* ==========================
   BUTTON
========================== */

        .menu-button {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 66px;
            background: #F4F4F4;
            color: #5E603A;
            text-decoration: none;
            font-size: 20px;
            font-weight: 600;
            border-radius: 40px;
            margin-bottom: 20px;
            transition: .3s;
        }

        .menu-button:hover {
            background: #ffffff;
            transform: translateY(-2px);
        }

        /* ==========================
   CALENDAR
========================== */

        .calendar {
            margin-top: 30px;
            background: #fff;
            border-radius: 22px;
            padding: 22px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, .15);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h3 {
            font-size: 22px;
            color: #5E603A;
            font-weight: 700;
        }

        .calendar-header button {
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 10px;
            background: #6A6A3D;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: .3s;
        }

        .calendar-header button:hover {
            background: #55542f;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #5E603A;
            margin-bottom: 15px;
        }

        #calendarDays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day {
            width: 40px;
            height: 40px;
            margin: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 8px;
            cursor: pointer;
            transition: .3s;
            color: #5E603A;
        }

        .day:hover {
            background: #6A6A3D;
            color: #fff;
        }

        .today {
            background: #6A6A3D;
            color: #fff;
            font-weight: bold;
        }

        .empty {
            visibility: hidden;
        }

        @media(max-width:992px){

    .right{
        padding-left:0;
        border-left:none;
        border-top:2px solid rgba(255,255,255,.3);
        padding-top:30px;
    }

    .menu-button{
        height:60px;
        font-size:18px;
    }

    .calendar{
        padding:18px;
    }

}
    </style>

<body>

    <header>

        <div class="logo">
            <img src="assets/logo.png" alt="Logo">
            <div>
                <h2>LocalOutdoor</h2>
                <span>Explore Nature</span>
            </div>
        </div>

        <nav>
            <a href="index.html">Beranda</a>
            <a href="Panduan_Booking.html">Panduan Booking</a>
            <a href="Cek_Kuota.html" class="active">Cek Kuota</a>
        </nav>

    </header>

    <!-- ================= MAIN ================= -->

    <main>
                <!-- KANAN -->
                <section class="right">

                    <a href="Booking_Online/pendaftaran.html" class="menu-button">
                        Booking Online
                    </a>
                    <a href="kontak.html" class="menu-button">
                        Kontak
                    </a>

                <div class="calendar">

                    <div class="calendar-header">
                    <button id="prevMonth">&#10094;</button>
                    <h3 id="monthYear"></h3>

                    <button id="nextMonth">&#10095;</button>

                </div>

                <div class="weekdays">
                    <span>Min</span>
                    <span>Sen</span>
                    <span>Sel</span>
                    <span>Rab</span>
                    <span>Kam</span>
                    <span>Jum</span>
                    <span>Sab</span>
                </div>

                <div id="calendarDays"></div>

            </div>

        </section>
    </main>

            <script>
                for (let i = 1; i <= 31; i++) {

                    tanggal.innerHTML += `<option value="${i}">${i}</option>`;

                }

                // ===============================
                // KALENDER
                // ===============================

                const calendarDays = document.getElementById("calendarDays");
                const monthYear = document.getElementById("monthYear");

                const months = [
                    "Januari", "Februari", "Maret", "April", "Mei", "Juni",
                    "Juli", "Agustus", "September", "Oktober", "November", "Desember"
                ];

                let month = 7;
                let year = 2026;

                function renderCalendar() {

                    calendarDays.innerHTML = "";

                    monthYear.innerHTML = months[month] + " " + year;

                    let firstDay = new Date(year, month, 1).getDay();

                    let lastDate = new Date(year, month + 1, 0).getDate();

                    for (let i = 0; i < firstDay; i++) {

                        let div = document.createElement("div");

                        div.className = "empty";

                        calendarDays.appendChild(div);

                    }

                    for (let d = 1; d <= lastDate; d++) {

                        let div = document.createElement("div");

                        div.className = "day";

                        div.innerHTML = d;

                        div.onclick = function () {

                            tanggal.value = d;

                            updateKuota();

                            document.querySelectorAll(".day").forEach(x => x.classList.remove("today"));

                            div.classList.add("today");

                        }

                        calendarDays.appendChild(div);

                    }

                }

                renderCalendar();

                // ===============================
                // PINDAH BULAN
                // ===============================

                document.getElementById("prevMonth").onclick = function () {

                    month--;

                    if (month < 0) {

                        month = 11;

                        year--;

                    }

                    bulan.selectedIndex = month;

                    renderCalendar();

                }

                document.getElementById("nextMonth").onclick = function () {

                    month++;

                    if (month > 11) {

                        month = 0;

                        year++;

                    }

                    bulan.selectedIndex = month;

                    renderCalendar();

                }

                // ===============================
                // DROPDOWN BULAN
                // ===============================

                bulan.addEventListener("change", function () {

                    month = this.selectedIndex;

                    renderCalendar();

                });
            </script>
</body>

</html>
