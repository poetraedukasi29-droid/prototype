<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Berhasil</title>

    <link rel="stylesheet" href="header.css">
    
</head>
<style>
    body{
    background:#5e603a;
    font-family:Poppins,sans-serif;
}

main{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

.success-card{

    width:500px;

    background:#fff;

    border-radius:20px;

    padding:40px;

    text-align:center;

    color:#444;

}

.check{

    width:90px;
    height:90px;

    margin:auto;

    border-radius:50%;

    background:#4CAF50;

    color:white;

    font-size:50px;

    display:flex;

    justify-content:center;

    align-items:center;

}

.success-card h1{

    margin:20px 0;

    color:#4CAF50;

}

table{

    width:100%;

    margin:30px 0;

}

td{

    padding:10px;

}

.button-group{

    display:flex;

    gap:15px;

}

.btn{

    flex:1;

    background:#5e603a;

    color:white;

    text-decoration:none;

    padding:15px;

    border-radius:40px;

    transition:.3s;

}

.btn:hover{

    background:#444;

}

.info-item{
    margin:20px 0;
    text-align:center;
}

.label{
    display:block;
    font-size:18px;
    font-weight:600;
    color:#666;
    margin-bottom:8px;
}

.value{
    display:block;
    font-size:28px;
    font-weight:bold;
    color:#5e603a;
}

</style>
<body>

<main>

    <div class="success-card">

        <div class="check">
            ✓
        </div>

        <h1>Booking Berhasil</h1>

        <p>
            Terima kasih telah melakukan booking pendakian Gunung Sindoro.
        </p>

        <table>

            <div class="info-item">
                <span class="label">Nomor Booking</span>
                <span class="value" id="bookingNumber"></span>
            </div>

        </table>

        <div class="button-group">
            <a href="../index.html" class="btn">
                Kembali ke Beranda
            </a>

        </div>

    </div>

</main>

<script>

const data = JSON.parse(localStorage.getItem("data_booking_terakhir"));

function generateBooking(){

    const now = new Date();

    const nomor =
        "BK-" +
        now.getFullYear() +
        String(now.getMonth()+1).padStart(2,"0") +
        String(now.getDate()).padStart(2,"0") +
        "-" +
        Math.floor(Math.random()*9000+1000);

    document.getElementById("bookingNumber").innerHTML = nomor;

    // Simpan nomor booking
    localStorage.setItem("nomor_booking", nomor);

}

const nomorLama = localStorage.getItem("nomor_booking");

if(nomorLama){

    document.getElementById("bookingNumber").innerHTML = nomorLama;

}else{

    generateBooking();

}

</script>

</body>
</html>
