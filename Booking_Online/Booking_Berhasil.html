<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Berhasil</title>

    <link rel="stylesheet" href="header.css">
    
</head>
<style>
    body{
    margin:0;
    background:#5e603a;
    font-family:Poppins,sans-serif;
}

main{
    width:100%;
    min-height:calc(100vh - 90px);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:80px 0 40px;
}

.success-card{

    width:500px;

    background:#fff;

    border-radius:20px;

    padding:40px;

    text-align:center;

    color:#444;

}

.check{

    width:90px;
    height:90px;

    margin:auto;

    border-radius:50%;

    background:#4CAF50;

    color:white;

    font-size:50px;

    display:flex;

    justify-content:center;

    align-items:center;

}

.success-card h1{

    margin:20px 0;

    color:#4CAF50;

}

table{

    width:100%;

    margin:30px 0;

}

td{

    padding:10px;

}

.button-group{

    display:flex;

    gap:15px;

}

.btn{

    flex:1;

    background:#5e603a;

    color:white;

    text-decoration:none;

    padding:15px;

    border-radius:40px;

    transition:.3s;

}

.btn:hover{

    background:#444;

}

.info-item{
    margin:20px 0;
    text-align:center;
}

.label{
    display:block;
    font-size:18px;
    font-weight:600;
    color:#666;
    margin-bottom:8px;
}

.value{
    display:block;
    font-size:28px;
    font-weight:bold;
    color:#5e603a;
}

</style>
<body>

<header class="site-header" style="position:absolute; top:0; left:0; width:100%; padding:20px 30px 18px; display:flex; align-items:center; gap:14px; background:transparent; z-index:5; border-bottom:1px solid rgba(255,255,255,0.35);">
    <a href="../index.html" class="brand" style="display:flex; align-items:center; gap:14px; color:#fff; text-decoration:none;">
        <img src="../Image/logo.png" alt="Logo LocalOutdoor" style="width:48px; height:48px; object-fit:cover; border-radius:12px; border:2px solid rgba(255,255,255,.25);">
        <div style="display:flex; flex-direction:column; line-height:1.1;">
            <span style="font-size:18px; font-weight:700; color:#fff;">LocalOutdoor</span>
            <span style="font-size:13px; color:rgba(255,255,255,.85);">Jalur Resmi Gunung Sindoro</span>
        </div>
    </a>
</header>

<main>

    <div class="success-card">

        <div class="check">
            ✓
        </div>

        <h1>Booking Berhasil</h1>

        <p>
            Terima kasih telah melakukan booking pendakian Gunung Sindoro.
            jangan lupa screenshoot
        </p>

        <div class="info-item">
            <span class="label">Nomor Booking</span>
            <span class="value" id="bookingNumber"></span>
        </div>

        <div class="button-group">

            <a href="tiket.html" class="btn">
                Cetak Tiket
            </a>

            <a href="../index.html" class="btn">
                Kembali ke Beranda
            </a>

        </div>

    </div>

</main>

<script>

const data = JSON.parse(localStorage.getItem("data_booking_terakhir"));

function generateBooking(){

    const now = new Date();

    const nomor =
        "BK-" +
        now.getFullYear() +
        String(now.getMonth()+1).padStart(2,"0") +
        String(now.getDate()).padStart(2,"0") +
        "-" +
        Math.floor(Math.random()*9000+1000);

    document.getElementById("bookingNumber").innerHTML = nomor;

    // Simpan nomor booking
    localStorage.setItem("nomor_booking", nomor);

}

const nomorLama = localStorage.getItem("nomor_booking");

if(nomorLama){

    document.getElementById("bookingNumber").innerHTML = nomorLama;

}else{

    generateBooking();

}
</script>

<script src="../header.js"></script>

</body>
</html>
