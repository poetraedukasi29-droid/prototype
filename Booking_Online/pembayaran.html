<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking Online - Localoutdoor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="header.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

    :root {
      --bg-green: #5e603a;
      --bg-green-dark: #45502c;
      --card-bg: #efefef;
      --panel-bg: #ffffff;
      --text-dark: #2f4f3a;
      --line-color: #5e603a;
    }

    * { 
      box-sizing: border-box; 
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-green);
      font-family: 'Poppins', sans-serif;
      color: var(--text-dark);
    }

    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 30px;
      border-bottom: 1px solid rgba(255,255,255,0.6);
    }

    .brand { 
      display: flex; 
      align-items: center; 
      gap: 10px; 
    }

    .brand-name {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      color: #f2f2f2;
      font-size: 18px;
      white-space: nowrap;
    }

    .logo {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #6b4b2a, #3a2b18 70%);
      border: 2px solid #caa24a;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8c97a;
      font-size: 8px;
      text-align: center;
      line-height: 1.1;
      padding: 4px;
    }

    .booking-pill {
      flex: 1;
      background: var(--card-bg);
      border-radius: 30px;
      text-align: center;
      padding: 14px 0;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 16px;
    }

    main {
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .card {
      background: var(--card-bg);
      width: 100%;
      max-width: 620px;
      border-radius: 24px;
      padding: 24px 30px 30px;
    }

    .card h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 30px;
      font-weight: 700;
      margin: 0 0 16px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--line-color);
    }

    .draft-info-box {
      background-color: rgba(69, 80, 44, 0.1);
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--bg-green-dark);
      margin-bottom: 20px;
      line-height: 1.5;
      border-left: 5px solid var(--bg-green);
    }

    .field-control-group {
      display: flex;
      align-items: center;
      margin-bottom: 25px;
      background-color: rgba(47, 85, 70, 0.1);
      padding: 12px 20px;
      border-radius: 15px;
      width: fit-content;
    }

    .field-control-group label {
      font-weight: 700;
      margin-right: 15px;
      color: var(--text-dark);
    }

    .field-control-group input {
      width: 70px;
      padding: 5px;
      border: 2px solid var(--line-color);
      border-radius: 8px;
      font-weight: 700;
      text-align: center;
      color: var(--text-dark);
      background: transparent;
      font-size: 1rem;
    }

    .hikers-list {
      margin-bottom: 25px;
      max-height: 280px;
      overflow-y: auto;
      padding-right: 10px;
    }

    .hiker-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 20px;
    }

    .input-wrapper {
      display: flex;
      align-items: center;
      border-bottom: 2px solid var(--line-color);
      padding-bottom: 6px;
      flex: 2;
    }

    .input-wrapper i {
      color: var(--text-dark);
      font-size: 1.3rem;
      margin-right: 12px;
    }

    .input-wrapper input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-dark);
      font-size: 1rem;
      font-weight: 700;
      width: 100%;
      font-family: 'Poppins', sans-serif;
    }

    .input-wrapper input::placeholder {
      color: rgba(47, 79, 58, 0.5);
    }

    .age-wrapper {
      flex: 1;
      max-width: 120px;
    }

    .upload-section {
      padding: 20px 0;
      border-top: 2px solid var(--line-color);
    }

    .field-title {
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 20px;
      margin: 0 0 14px;
    }

    .hidden-file-input {
      display: none;
    }

    .file-status {
      font-size: 0.85rem;
      color: var(--text-dark);
      margin-top: 5px;
      margin-left: 5px;
      font-style: italic;
    }

    .panel-done {
      width: 100%;
      margin-top: 4px;
      background: var(--bg-green);
      color: #f2f2f2;
      border: none;
      padding: 12px;
      border-radius: 30px;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: filter 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .panel-done:hover {
      filter: brightness(1.2);
    }

    .actions-group {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      padding-top: 35px;
    }

    .next-btn {
      background: var(--bg-green);
      color: #e8e8e8;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 18px;
      border: none;
      padding: 14px 60px;
      border-radius: 30px;
      cursor: pointer;
      transition: filter 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-back {
      background-color: #5e603a;
      color: #e8e8e8;
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
      font-weight: 700;
      font-size: 18px;
      padding: 14px 45px;
      border-radius: 30px;
      transition: filter 0.15s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .next-btn:hover, .btn-back:hover { 
      filter: brightness(1.2); 
}

    .hikers-list::-webkit-scrollbar {
      width: 6px;
    }
    .hikers-list::-webkit-scrollbar-thumb {
      background-color: var(--bg-green-dark);
      border-radius: 10px;
    }

    @media (max-width: 600px) {
      header { flex-wrap: wrap; }
      .card { padding: 24px 20px 30px; }
      .card h1 { font-size: 24px; }
      .actions-group { flex-direction: row; gap: 10px; }
      .next-btn, .btn-back { padding: 12px 30px; font-size: 16px; }
      .hiker-row { flex-direction: column; gap: 10px; align-items: stretch; }
      .age-wrapper { max-width: 100%; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <div class="logo">BIMBA RAYA</div>
      <div class="brand-name">Localoutdoor</div>
    </div>
    <div class="booking-pill">BOOKING ONLINE</div>
  </header>

  <main>
    <div class="card">
      <h1>Detail Pendaki & Berkas</h1>
      
      <!-- Tempat Info Ringkasan Ringkas Otomatis dari Halaman Pendaftaran -->
      <div id="draft-info-summary" class="draft-info-box"></div>

      <div class="field-control-group">
        <label for="jumlah-pendaki">Jumlah Peserta/Pendaki:</label>
        <input type="number" id="jumlah-pendaki" min="1" max="20" value="2">
      </div>

      <!-- Container Baris Input Nama & Umur Pendaki -->
      <div class="hikers-list" id="hikers-container"></div>

      <!-- Area Unggah Berkas & Aksi Pembayaran -->
      <div class="field upload-section">
        <p class="field-title">Unggah Dokumen Syarat</p>
        
        <div class="upload-block">
          <button type="button" class="panel-done" onclick="document.getElementById('file-simaksi').click()">
            <i class="far fa-image"></i> Unggah Berkas SIMAKSI
          </button>
          <input type="file" id="file-simaksi" class="hidden-file-input" onchange="updateFileStatus('file-simaksi', 'status-simaksi')">
          <div class="file-status" id="status-simaksi">Belum ada berkas terpilih</div>
        </div>

        <div class="upload-block" style="margin-top: 15px;">
          <button type="button" class="panel-done" onclick="document.getElementById('file-pembayaran').click()">
            <i class="far fa-image"></i> Bukti Pembayaran
          </button>
          <input type="file" id="file-pembayaran" accept="image/*" class="hidden-file-input" onchange="updateFileStatus('file-pembayaran', 'status-pembayaran')">
          <div class="file-status" id="status-pembayaran">Belum ada foto bukti pembayaran</div>
        </div>
      </div>

      <!-- Grup Tombol Navigasi Bawah -->
      <div class="actions-group">
        <a href="#" class="btn-back" onclick="event.preventDefault(); window.history.back();">
          <i class="fas fa-arrow-left"></i> Kembali
        </a>
        <button type="button" class="next-btn" id="btn-booking" onclick="saveBookingData()">
          Booking
        </button>
      </div>

    </div>
  </main>

  <script>
    const hikersContainer = document.getElementById('hikers-container');
    const jumlahPendakiInput = document.getElementById('jumlah-pendaki');

    // Fungsi membuat baris form pendaki
    function generateHikerRows(count) {
        hikersContainer.innerHTML = ''; 
        
        for (let i = 1; i <= count; i++) {
            const row = document.createElement('div');
            row.className = 'hiker-row';
            row.innerHTML = `
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" class="hiker-name" placeholder="Nama Pendaki ${i}" required>
                </div>
                <div class="input-wrapper age-wrapper">
                    <input type="number" class="hiker-age" placeholder="Umur" min="1" max="100" required>
                </div>
            `;
            hikersContainer.appendChild(row);
        }
    }

    // Listener perubahan manual input jumlah pendaki
    jumlahPendakiInput.addEventListener('input', (e) => {
        let value = parseInt(e.target.value);
        if (isNaN(value) || value < 1) value = 1;
        if (value > 20) value = 20;
        generateHikerRows(value);
    });

    // Default awal generator
    generateHikerRows(2);

    // Update Teks Label Nama Berkas ketika diunggah
    function updateFileStatus(inputId, statusId) {
        const input = document.getElementById(inputId);
        const statusDiv = document.getElementById(statusId);
        if (input.files.length > 0) {
            statusDiv.innerText = `Terpilih: ${input.files[0].name}`;
            statusDiv.style.color = "#45502c";
            statusDiv.style.fontWeight = "bold";
        } else {
            statusDiv.innerText = inputId === 'file-simaksi' ? "Belum ada berkas terpilih" : "Belum ada foto bukti pembayaran";
            statusDiv.style.color = "#2f4f3a";
            statusDiv.style.fontWeight = "normal";
        }
    }

    // Validasi komplit, kumpulkan data, lalu eksekusi checkout final ke LocalStorage
    function saveBookingData() {
        const names = document.querySelectorAll('.hiker-name');
        const ages = document.querySelectorAll('.hiker-age');
        const simaksiFile = document.getElementById('file-simaksi').files[0];
        const pembayaranFile = document.getElementById('file-pembayaran').files[0];

        let hikersData = [];
        let isValid = true;

        names.forEach((nameInput, index) => {
            const name = nameInput.value.trim();
            const age = ages[index].value.trim();

            if (!name || !age) {
                isValid = false;
            } else {
                hikersData.push({
                    no: index + 1,
                    nama: name,
                    umur: age
                });
            }
        });

        if (!isValid) {
            alert("Mohon lengkapi semua data nama dan umur pendaki terlebih dahulu!");
            return;
        }

        if (!simaksiFile || !pembayaranFile) {
            alert("Mohon unggah berkas SIMAKSI dan foto bukti pembayaran sebelum melakukan Booking!");
            return;
        }

        const bookingData = {
            waktu_booking: new Date().toLocaleString('id-ID'),
            total_peserta: hikersData.length,
            daftar_pendaki: hikersData,
            nama_berkas_simaksi: simaksiFile.name,
            nama_berkas_pembayaran: pembayaranFile.name
        };

        localStorage.setItem('data_booking_terakhir', JSON.stringify(bookingData));
        window.location.href = "Booking_Berhasil.html";
    }

    // System intercept: Ambil manifest bookingDraft dari pendaftaran
    document.addEventListener('DOMContentLoaded', () => {
        try {
            const draftRaw = localStorage.getItem('bookingDraft');
            if (!draftRaw) return;
            const draft = JSON.parse(draftRaw);
            if (!draft) return;

            // Cetak kotak ringkasan data jalur & tanggal di bagian atas card
            const infoBox = document.getElementById('draft-info-summary');
            if (infoBox) {
                infoBox.innerHTML = `
                    🏔 <b>Jalur:</b> ${draft.jalur || '-'}<br>
                    📅 <b>Tanggal:</b> ${draft.tanggal || '-'}<br>
                    👥 <b>Pilihan Grup:</b> ${draft.total_pendaki || '-'} Orang • <b>Total Biaya:</b> ${draft.harga || 'Rp0'}
                `;
            }

            // Set keselarasan otomatis total pendaki sesuai konter halaman pendaftaran
            if (draft.total_pendaki && Number(draft.total_pendaki) > 0) {
                jumlahPendakiInput.value = Number(draft.total_pendaki);
                generateHikerRows(Number(draft.total_pendaki));
            }
        } catch (e) {
            console.warn('Gagal memuat sinkronisasi otomatis draft booking:', e);
        }
    });
  </script>
</body>
</html>
.
