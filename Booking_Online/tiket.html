<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tiket Pendakian</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
}

body{
    background:#f3f3f3;
    font-family:Poppins,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:700px;
    max-width:90%;
}

.ticket{

    background:#fff;

    border-radius:20px;

    padding:35px;

    border:2px dashed #5e603a;

    box-shadow:0 10px 20px rgba(0,0,0,.15);

}

h1{
    text-align:center;
    color:#5e603a;
    margin-bottom:10px;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    padding:14px 12px;
    border-bottom:1px solid #ddd;
    font-size:18px;
}

.label{
    width:220px;
    font-weight:bold;
}

.status{
    color:green;
    font-weight:bold;
}

.btn-print{

    width:100%;

    margin-top:30px;

    padding:16px;

    border:none;

    border-radius:40px;

    background:#5e603a;

    color:white;

    font-size:20px;

    cursor:pointer;

    transition:.3s;

}

.btn-print:hover{

    background:#4a4c2f;

}

@media(max-width:768px){

.container{

    width:95%;

}

.ticket{

    padding:25px;

}

td{

    font-size:15px;

    padding:10px;

}

.label{

    width:140px;

}

.btn-print{

    font-size:17px;

    padding:14px;

}

}

@media print{

.btn-print{

display:none;

}

body{

background:white;

}

.ticket{

box-shadow:none;

border:2px dashed #5e603a;

}

}

</style>

</head>

<body>

<div class="container">

<div class="ticket">

<h1>LOCALOUTDOOR</h1>

<h2>Tiket Pendakian Gunung Sindoro</h2>

<table>

<tr>
<td class="label">Nomor Booking</td>
<td id="nomor"></td>
</tr>

<tr>
<td class="label">Jalur</td>
<td id="jalur"></td>
</tr>

<tr>
<td class="label">Tanggal</td>
<td id="tanggal"></td>
</tr>

<tr>
<td class="label">Jumlah Pendaki</td>
<td id="pendaki"></td>
</tr>

<tr>
<td class="label">Total Pembayaran</td>
<td id="harga"></td>
</tr>

<tr>
<td class="label">Status</td>
<td class="status">LUNAS</td>
</tr>

</table>

<button class="btn-print" onclick="downloadTiket()">
Download Tiket
</button>

</div>

</div>

<script>

//==============================
// STATUS DOWNLOAD
//==============================

let tiketSudahDidownload = false;

//==============================
// AMBIL DATA BOOKING
//==============================

const nomor = localStorage.getItem("nomor_booking");

document.getElementById("nomor").textContent = nomor || "-";

const draft = JSON.parse(localStorage.getItem("bookingDraft"));

if(draft){

    document.getElementById("jalur").textContent = draft.jalur;
    document.getElementById("tanggal").textContent = draft.tanggal;
    document.getElementById("pendaki").textContent = draft.total_pendaki + " Orang";
    document.getElementById("harga").textContent = draft.harga;

}

//==============================
// DOWNLOAD TIKET
//==============================

function downloadTiket(){

    tiketSudahDidownload = true;

    window.print();

}

//==============================
// SELESAI PRINT
//==============================

window.onafterprint = function(){

    window.location.href="../index.html";

};

//==============================
// BLOKIR BACK
//==============================

history.pushState(null,null,location.href);

window.addEventListener("popstate",function(){

    if(!tiketSudahDidownload){

        alert("Silakan download tiket terlebih dahulu sebelum kembali ke Beranda.");

        history.pushState(null,null,location.href);

    }

});

//==============================
// BLOKIR REFRESH / TUTUP TAB
//==============================

window.addEventListener("beforeunload",function(e){

    if(!tiketSudahDidownload){

        e.preventDefault();

        e.returnValue="";

    }

});

</script>

</body>
</html>
