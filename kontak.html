<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kontak | LocalOutdoor</title>

    <link rel="stylesheet" href="style.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #396d5c;
            animation: fade .8s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 90px;
            background: #356857;
            display: flex;
            align-items: center;
            padding: 20px;
            border-bottom: 2px solid white;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-area img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid white;
        }

        .logo-area h3 {
            color: white;
            font-size: 18px;
        }

        .judul {
            margin: auto;
            background: white;
            width: 60%;
            text-align: center;
            padding: 12px;
            border-radius: 30px;
            font-weight: bold;
            color: #184b3b;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 500px;
            background: rgba(255, 255, 255, .08);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .kontak {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 35px;
        }

        .kontak i {
            font-size: 55px;
            color: white;
            transition: .4s;
        }

        .kontak:hover i {
            transform: scale(1.2);
            color: #d8ff8c;
        }

        .kontak h2 {
            color: white;
        }

        .kontak p {
            color: #e8e8e8;
            margin: 5px 0 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: .3s;
        }

        button:hover {
            background: #d6f8c8;
        }

        .home {
            display: block;
            margin-top: 20px;
            text-align: center;
            background: white;
            padding: 15px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            color: #245948;
            transition: .3s;
        }

        .home:hover {
            background: #d8ff8c;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: white;
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media(max-width:700px) {
            .card {
                width: 90%;
            }

            .judul {
                width: 70%;
            }
        }
    </style>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <header>

        <div class="logo-area">

            <img src="logo.svg" alt="Logo LocalOutdoor">

            <h3>LocalOutdoor</h3>

        </div>

        <div class="judul">
            KONTAK
        </div>

    </header>


    <main>

        <div class="card">

            <div class="kontak">

                <i class="fa-brands fa-whatsapp"></i>

                <div>

                    <h2>WhatsApp</h2>

                    <p>0823-xxxx-xxxx</p>

                    <button onclick="copyWA()">

                        Copy Nomor

                    </button>

                </div>

            </div>


            <div class="kontak">

                <i class="fa-brands fa-instagram"></i>

                <div>

                    <h2>Instagram</h2>

                    <p>@localoutdoor</p>

                    <button onclick="instagram()">

                        Buka Instagram

                    </button>

                </div>

            </div>


            <a href="index.html" class="home">

                <i class="fa-solid fa-house"></i>

                Kembali ke Home

            </a>

        </div>

    </main>

    <footer>

        Copyright © 2026 LocalOutdoor

    </footer>

    <script src="script.js"></script>

</body>

</html>
