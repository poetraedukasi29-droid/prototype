<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kontak | LocalOutdoor</title>

    <link rel="stylesheet" href="header.css">

    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#5e603a;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    animation:fade .8s;
}

/* ==========================
   MAIN
========================== */

main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:60px 20px;
}

/* ==========================
   CARD
========================== */

.card{
    width:430px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:35px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

/* ==========================
   KONTAK
========================== */

.kontak{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:35px;
}

.kontak i{
    font-size:48px;
    color:white;
    transition:.3s;
    min-width:60px;
    text-align:center;
}

.kontak:hover i{
    color:#d8ff8c;
    transform:scale(1.1);
}

.kontak h2{
    color:white;
    font-size:18px;
    font-weight:600;
    margin-bottom:5px;
}

.kontak p{
    color:#ececec;
    font-size:15px;
    margin-bottom:12px;
}

/* ==========================
   BUTTON
========================== */

button{
    padding:10px 18px;
    border:none;
    border-radius:30px;
    background:white;
    color:#5e603a;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    transition:.3s;
}

button:hover{
    background:#d8ff8c;
    transform:translateY(-2px);
}

/* ==========================
   HOME BUTTON
========================== */

.home{
    display:block;
    width:100%;
    text-align:center;
    text-decoration:none;
    background:white;
    color:#5e603a;
    padding:14px;
    border-radius:35px;
    font-size:18px;
    font-weight:600;
    transition:.3s;
}

.home:hover{
    background:#d8ff8c;
    transform:translateY(-2px);
}

/* ==========================
   FOOTER
========================== */

footer{
    text-align:center;
    color:white;
    padding:25px;
    font-size:18px;
}

/* ==========================
   ANIMATION
========================== */

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* ==========================
   RESPONSIVE
========================== */

@media(max-width:768px){

    main{
        padding:40px 15px;
    }

    .card{
        width:100%;
        max-width:400px;
        padding:30px 25px;
    }

    .kontak{
        gap:15px;
    }

    .kontak i{
        font-size:42px;
        min-width:50px;
    }

    .kontak h2{
        font-size:17px;
    }

    .kontak p{
        font-size:14px;
    }

    button{
        font-size:13px;
        padding:9px 16px;
    }

    .home{
        font-size:16px;
    }

}
    </style>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <header class="site-header">

                <span class="brand-name">LocalOutdoor</span>

        <button class="nav-toggle" id="navToggle" aria-label="Buka menu" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>

        <nav class="site-nav" id="siteNav">

            <a href="Panduan_Booking.html">Panduan Booking</a>

        </nav>
    </header>

    <main>

        <div class="card">

            <div class="kontak">

                <i class="fa-brands fa-whatsapp"></i>

                <div>

                    <h2>WhatsApp</h2>

                    <button onclick="copyWA()">

            <div class="kontak">

    <footer>

        Copyright © 2026 LocalOutdoor

    <script src="header.js"></script>

</html>
