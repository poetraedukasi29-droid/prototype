        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#5e603a;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    animation:fade .8s;
}

/* ==========================
   MAIN
========================== */

main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding:60px 20px;
}

/* ==========================
   CARD
========================== */

.card{
    width:430px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:35px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

/* ==========================
   KONTAK
========================== */

.kontak{
    display:flex;
    align-items:center;
    gap:20px;
    margin-bottom:35px;
}

.kontak svg{
    transition:.3s;
    min-width:60px;
    background:rgba(255,255,255,.12);
    width:60px;
    height:60px;
    padding:12px;
    border-radius:50%;
    flex-shrink:0;
}

.kontak:hover svg{
    background:#d8ff8c;
    fill:#5e603a;
    transform:scale(1.1);
}

.kontak h2{
    color:white;
    font-size:18px;
    font-weight:600;
    margin-bottom:5px;
}

.kontak p{
    color:#ececec;
    font-size:15px;
    margin-bottom:12px;
}

button{
    padding:8px 16px;
    border:none;
    border-radius:30px;
    background:white;
    color:#5e603a;
    cursor:pointer;
    font-size:13px;
    font-weight:600;
    transition:.3s;
}

button:hover{
    background:#d8ff8c;
    transform:translateY(-2px);
}

/* ==========================
   FOOTER
========================== */

footer{
    text-align:center;
    color:white;
    padding:25px;
    font-size:18px;
}

/* ==========================
   ANIMATION
========================== */

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

/* ==========================
   RESPONSIVE
========================== */

@media(max-width:768px){

    main{
        padding:40px 15px;
    }

    .card{
        width:100%;
        max-width:400px;
        padding:30px 25px;
    }

    .kontak{
        gap:15px;
    }

    .kontak svg{
        min-width:50px;
        width:50px;
        height:50px;
        padding:10px;
    }

    .kontak h2{
        font-size:17px;
    }

    .kontak p{
        font-size:14px;
    }

    button{
        font-size:12px;
        padding:7px 14px;
    }

}
