    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            margin:0;
            min-height:100vh;
            display:flex;
            flex-direction:column;
            position:relative;
            overflow-x:hidden;
        }

        /* Background utama */
        body::before{
            content:"";

            position:fixed;
            top:0;
            left:0;

            width:100%;
            height:100%;

            background:url("Image/Sindoro3.jpg") no-repeat center center;
            background-size:cover;

            filter:blur(8px);
            transform:scale(1.1);

            z-index:-2;
        }

        /* Overlay biar tulisan lebih jelas */
        body::after{
            content:"";

            position:fixed;
            top:0;
            left:0;

            width:100%;
            height:100%;

            background:rgba(0,0,0,0.25);

            z-index:-1;
        }
        
        /* HEADER */

        header{
            background: #5e603a;;
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:20px 40px;
        }

        .logo{
            display:flex;
            align-items:center;
            gap:15px;
        }

        .logo-img{

            width:75px;
            height:75px;

            border-radius:50%;
            overflow:hidden;

            background:white;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .logo-img img{

            width:100%;
            height:100%;
            object-fit:cover;

        }

        .logo-text h2{

            color:#ffff;
            font-size:30px;

        }

        .logo-text p{

            color:#ffff;
            font-size:14px;

        }

        nav{
            display:flex;
            gap:30px;
        }

        nav a{

            text-decoration:none;
            background:#907c68;
            color:white;
            padding:16px 35px;
            border-radius:40px;
            font-size:18px;
            font-weight:bold;
            box-shadow:0 4px 10px rgba(0,0,0,.2);
            transition:.3s;

        }

        nav a:hover{

            background:#ffff;
            transform:translateY(-3px);

        }


            /* SLIDER */

        .slider{
            width:85%;
            max-width:1200px;
            margin:40px auto;
            display:flex;
            justify-content:center;
            align-items:center;
            gap:20px;
            background:transparent; /* hilangkan kotak putih */
            padding:0;
        }

        .banner{
            width:100%;
            max-width:1100px;
            height:420px;

            overflow:hidden;

            border-radius:20px;
        }

        .banner img{
            width:100%;
            height:100%;

            object-fit:cover;

            display:block;
        }

        
        .arrow{

            background:white;
            width:55px;
            height:55px;
            border-radius:50%;
            border:none;
            font-size:28px;
            color:#2f6d58;
            cursor:pointer;
            transition:.3s;

        }

        .arrow:hover{

            background:#2f6d58;
            color:white;

        }

        /* FOOTER */

        footer{
            margin-top:auto;
            background: #5e603a;;
            padding:18px;
            text-align:center;
        }

        footer p{
            color:#ffff;
            font-size:18px;
            font-weight:bold;
        }

        @media(max-width:768px){

            header{
                flex-direction:column;
                gap:20px;
            }

            nav{
                flex-direction:column;
                width:100%;
            }

            nav a{
                text-align:center;
                font-size:18px;
            }

            .slider{
                width:95%;
                height:auto;
                flex-direction:column;
                gap:20px;
            }

            .banner img{
                height:250px;
            }

            .arrow{
                font-size:40px;
            }

            .logo h2{
                font-size:28px;
            }

        }

    </style>

</head>
<body>

    <!-- HEADER -->
    <header>

        <div class="logo">

    <div class="logo-img">
        <img src="Image/logo.png" alt="Logo">
    </div>

    <script>

        const images = [
    "Image/Sindoro1.jpg",
    "Image/Sindoro2.jpg",
    "Image/Sindoro3.jpg",
    "Image/Sindoro4.jpg"
        ];

        let current = 0;

        const slide = document.getElementById("slide");

        function showSlide(index){
            slide.src = images[index];
        }

        function nextSlide(){
            current++;

            if(current >= images.length){
                current = 0;
            }

            showSlide(current);
        }

        function prevSlide(){
            current--;

            if(current < 0){
                current = images.length - 1;
            }

            showSlide(current);
        }

        setInterval(nextSlide,5000);

    </script>
