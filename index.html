<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalOutdoor</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="header.css">

</head>

<body>

    <header>
        <div class="logo">

            <div class="logo-circle">

                <svg class="logo-svg" viewBox="0 0 300 200">

                    <defs>
                         <path id="curve" d="M45,145 A105,105 0 0,1 255,145" />
                    </defs>

                    <text>
                        <textPath href="#curve" startOffset="50%" text-anchor="middle">
                            Localoutdoor
                        </textPath>
                    </text>

                </svg>

                <img src="Image/logo.png" alt="Logo">

            </div>

        </div>

        <nav>
            <a href="index.html">Beranda</a>
            <a href="Panduan_Booking.html">Panduan Booking</a>
            <a href="Cek_Kuota.html" class="active">Cek Kuota</a>
        </nav>

    </header>

    
    <!-- SLIDER -->
    <section class="slider">

        <button class="arrow prev">❮</button>

        <div class="banner">
            <img id="slide" src="Image/Sindoro1.jpg" id="slide">
            <img id="slide" src="Image/Sindoro2.jpg" id="slide">
            <img id="slide" src="Image/Sindoro3.jpg" id="slide">
            <img id="slide" src="Image/Sindoro4.jpg" id="slide">
            <img id="slide" src="Image/Sindoro5.jpg" id="slide">
        </div>

        <button class="arrow next">❯</button>

    </section>


    <script>

        const images = [
            "Image/Sindoro1.jpg",
            "Image/Sindoro2.jpg",
            "Image/Sindoro3.jpg",
            "Image/Sindoro4.jpg"
        ];

        let current = 0;
        function showSlide(index) {
            slide.src = images[index];
        }

        function nextSlide() {
            current++;

            if (current >= images.length) {
                current = 0;
            }

            showSlide(current);
        }

        function prevSlide() {
            current--;

            if (current < 0) {
                current = images.length - 1;
            }

            showSlide(current);
        }

        setInterval(nextSlide, 5000);

    </script>

    <script>

    let index = 0;

    const slide = document.getElementById("slide");

    function nextSlide(){
        index++;
        if(index >= images.length){
            index = 0;
        }
        slide.src = images[index];
    }

    function prevSlide(){
        index--;
        if(index < 0){
            index = images.length - 1;
        }
        slide.src = images[index];
    }

    setInterval(nextSlide,3000);

    document.querySelector(".next").onclick = nextSlide;
    document.querySelector(".prev").onclick = prevSlide;
    </script>
    <script>
    window.addEventListener("load",function(){

        const fade=document.querySelectorAll(".fade");

        fade.forEach((item)=>{
            item.classList.add("show");
        });

    });
    </script>
    <script src="header.js"></script>
</body>

</html>
